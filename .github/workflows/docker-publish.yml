name: Build and push guildclaw

on:
  workflow_dispatch:
    inputs:
      openclaw_version:
        description: "OpenClaw npm version (e.g. latest or 1.2.3)"
        required: false
        default: "latest"
      image_tag:
        description: "Docker tag"
        required: false
        default: "latest"

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Maximize build disk space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-large-packages: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"

      - uses: actions/checkout@v4

      - name: Resolve Docker Hub namespace
        id: hub
        run: |
          NS="${{ vars.DOCKERHUB_USERNAME }}"
          if [ -z "$NS" ]; then NS="${{ secrets.DOCKERHUB_USERNAME }}"; fi
          if [ -z "$NS" ]; then
            echo "::error::Set DOCKERHUB_USERNAME (variable or secret)"
            exit 1
          fi
          echo "namespace=$NS" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ steps.hub.outputs.namespace }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            OPENCLAW_VERSION=${{ inputs.openclaw_version }}
          tags: |
            ${{ steps.hub.outputs.namespace }}/guildclaw:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
